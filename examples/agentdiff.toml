# agentdiff golden-trace CI policy.
# Copy to your repo root (as agentdiff.toml or .agentdiff.toml) and tune.
[agentdiff]
# Fail the check if cost rises/falls more than this percent vs the golden run.
max_cost_delta_pct = 10.0
# Fail if total tokens move more than this percent vs the golden run.
max_token_delta_pct = 20.0
# When false, any structural change (insert/delete/substitute step) fails the check.
allow_structural_change = false
