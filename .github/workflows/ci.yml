name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=agentdiff --cov-report=term-missing

  build-smoke:
    # Prove the wheel ships the Jinja template + package data by installing it
    # into a clean environment and running the tool against the examples.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: pip install build && python -m build
      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
      - name: Run against examples (proves template shipped)
        run: |
          /tmp/clean/bin/agentdiff diff examples/trace-a.jsonl examples/trace-b.jsonl \
            --no-open --out /tmp/report.html
          test -s /tmp/report.html
          ! grep -q "https\?://" /tmp/report.html
